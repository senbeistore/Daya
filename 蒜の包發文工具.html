input[type="date"]:focus { border-color:#C4702A; }
.dp { margin-top:8px; font-size:13px; color:#C4702A; font-weight:600; padding:6px 10px; background:#FFF4E8; border-radius:8px; }

.empty-msg { text-align:center; font-size:13px; color:#C8A88A; padding:14px 0; line-height:1.6; }

.mrow { padding:9px 0; border-bottom:1px solid #F5EDE0; }
.mrow:last-child { border-bottom:none; }
.mrow-top { display:flex; align-items:center; gap:6px; margin-bottom:5px; }
.mrow-hrt { color:#E05050; font-size:14px; flex-shrink:0; }
.mi-label { flex:1; border:1px solid #E8D9C5; border-radius:7px; padding:5px 8px; font-size:13px; font-weight:600; color:#2C1A00; background:#FDFAF6; outline:none; min-width:0; }
.mi-label:focus { border-color:#C4702A; }
.mi-addr { width:100%; border:1px solid #E8D9C5; border-radius:7px; padding:5px 8px; font-size:12px; color:#5A3A1A; background:#FDFAF6; outline:none; }
.mi-addr:focus { border-color:#C4702A; }
.btn-del { background:none; border:none; color:#D0B090; font-size:18px; cursor:pointer; padding:2px 4px; line-height:1; flex-shrink:0; }

.btn-add-m { width:100%; border:1.5px dashed #E8D9C5; border-radius:10px; background:none; color:#C4702A; font-size:14px; font-weight:600; padding:10px; cursor:pointer; margin-top:8px; }
.btn-add-m:active { background:#FFF4E8; }

/* PICKER */
.ov { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:99; }
.ov.on { display:block; }
.panel { display:none; position:fixed; bottom:0; left:0; right:0; background:#fff; border-radius:20px 20px 0 0; box-shadow:0 -6px 24px rgba(0,0,0,.18); z-index:100; max-height:74vh; flex-direction:column; }
.panel.on { display:flex; }

.panel-hd { padding:14px 14px 12px; border-bottom:1px solid #F0E4D4; display:flex; align-items:center; gap:10px; flex-shrink:0; }
.panel-hd input { flex:1; border:1.5px solid #E8D9C5; border-radius:8px; padding:8px 12px; font-size:15px; outline:none; color:#2C1A00; background:#FDFAF6; }
.panel-hd input:focus { border-color:#C4702A; }
.panel-x { background:none; border:none; font-size:22px; color:#B8855A; cursor:pointer; line-height:1; padding:0 2px; }

.pb { overflow-y:auto; -webkit-overflow-scrolling:touch; flex:1; }

.rg-label { padding:7px 16px 4px; font-size:11px; font-weight:700; color:#B8855A; letter-spacing:1.2px; background:#FDFAF6; border-bottom:1px solid #F0E4D4; }
.pi { display:flex; align-items:center; justify-content:space-between; padding:11px 16px; cursor:pointer; border-bottom:1px solid #FAF0E6; }
.pi:active { background:#FFF8F0; }
.pi.done { opacity:.3; pointer-events:none; }
.pi-nm { font-size:14px; font-weight:600; color:#2C1A00; }
.pi-ad { font-size:12px; color:#A08060; margin-top:1px; }
.pi-ic { color:#C4702A; font-size:22px; line-height:1; font-weight:300; flex-shrink:0; margin-left:8px; }

.manual { padding:14px 16px 20px; border-top:1px dashed #E8D9C5; }
.manual-lb { font-size:11px; color:#B8855A; font-weight:700; margin-bottom:8px; letter-spacing:1px; }
.mrow2 { display:flex; gap:8px; margin-bottom:7px; }
.mrow2 input { flex:1; border:1.5px solid #E8D9C5; border-radius:8px; padding:8px 10px; font-size:14px; color:#2C1A00; background:#FDFAF6; outline:none; }
.mrow2 input:focus { border-color:#C4702A; }

.btn-manual:active { background:#FFEBCF; }

/* COPY */
.btn-copy { width:100%; background:#C4702A; color:#fff; border:none; border-radius:14px; padding:15px; font-size:17px; font-weight:700; cursor:pointer; letter-spacing:1px; box-shadow:0 3px 12px rgba(196,112,42,.32); margin-bottom:12px; }

<div class="wrap">
  <header>

    <div class="dp" id="dp"></div>

  <div class="card">
    <div class="cl">📍 今日市場</div>
    <div id="todayList"></div>
    <button class="btn-add-m" onclick="openPanel()">＋ 新增市場</button>
  </div>

  <div class="warn" id="warn">⚠️ 請至少加入一個市場</div>
  <button class="btn-copy" id="copyBtn" onclick="doPost()">📋 複製貼文</button>

  <div class="card">
    <div class="cl">預覽</div>
    <div class="preview" id="preview"></div>
  </div>
</div>

<div class="ov" id="ov" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-hd">
    <input type="search" id="sq" placeholder="搜尋市場名稱或地區…" oninput="renderPicker()">

let today = [];

// ─── Date ───
function initDate() {
  const d = new Date();
  d.setDate(d.getDate() + 1);
  return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
}
function refreshDP(v) {
  if (!v) return;
  const [y,m,d] = v.split('-').map(Number);
  const wd = WD[new Date(y,m-1,d).getDay()];
  document.getElementById('dp').textContent = `→ 🍞${p2(m)} / ${p2(d)}（${wd}）快閃市場`;
}

// ─── Today list ───
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function renderToday() {
  const el = document.getElementById('todayList');
  if (!today.length) {
    el.innerHTML = '<div class="empty-msg">尚未選擇市場<br>點下方「＋ 新增市場」加入</div>';
    return;
  }
  el.innerHTML = today.map(m => `
    <div class="mrow">
      <div class="mrow-top">
        <span class="mrow-hrt">❤️</span>
        <input class="mi-label" value="${esc(m.label)}"
          onchange="upLabel(${m.id},this.value)">
        <button class="btn-del" onclick="delM(${m.id})">✕</button>
      </div>
      <input class="mi-addr" value="${esc(m.addr)}" placeholder="地址"
        onchange="upAddr(${m.id},this.value)">
    </div>`).join('');
}
function upLabel(id, v) { const m=today.find(x=>x.id===id); if(m){m.label=v; updatePrev();} }
function upAddr(id, v)  { const m=today.find(x=>x.id===id); if(m){m.addr=v; updatePrev();} }
function delM(id) { today=today.filter(x=>x.id!==id); renderToday(); renderPicker(); updatePrev(); }

// ─── Picker ───
function openPanel() {
  document.getElementById('panel').classList.add('on');
  document.getElementById('ov').classList.add('on');
  document.getElementById('sq').value = '';
  renderPicker();
  setTimeout(() => document.getElementById('sq').focus(), 150);
}
function closePanel() {
  document.getElementById('panel').classList.remove('on');
  document.getElementById('ov').classList.remove('on');
}
function addFromDB(idx) {
  const m = DB[idx];
  const label = m.r + m.n;
  if (today.some(x => x.label === label)) return;
  today.push({id:uid++, label, addr:m.a});
  renderToday(); renderPicker(); updatePrev();
}
function renderPicker() {
  const q = document.getElementById('sq').value.trim().toLowerCase();
  const used = new Set(today.map(x => x.label));
  let html = '';

  if (!q) {
    html += `<div class="rg-label">全部市場</div>`;
  }

  const filtered = DB.filter(m =>
    !q || (m.r+m.n).includes(q) || m.a.toLowerCase().includes(q) || m.r.includes(q)
  );
  const regions = [...new Set(filtered.map(m => m.r))];
  regions.forEach(r => {
    html += `<div class="rg-label" style="font-size:10px;padding-left:20px;background:#fff">${r}</div>`;
    filtered.filter(m => m.r === r).forEach(m => {
      const label = m.r + m.n, idx = DB.indexOf(m);
      const done = used.has(label);
      html += `<div class="pi${done?' done':''}" data-idx="${idx}">
        <div><div class="pi-nm">${label}</div><div class="pi-ad">${m.a}</div></div>
        <div class="pi-ic">${done?'✓':'＋'}</div></div>`;
    });
  });

  // Manual add
  html += `<div class="manual">
    <div class="manual-lb">手動輸入</div>
    <div class="mrow2">
      <input id="mr" placeholder="縣市" style="max-width:80px">
      <input id="mn" placeholder="市場名稱">
    </div>
    <div class="mrow2"><input id="ma" placeholder="地址（選填）"></div>
    <button class="btn-manual" onclick="addManual()">＋ 加入今日</button>
  </div>`;

  const pb = document.getElementById('pb');
  pb.innerHTML = html;
  pb.onclick = e => {
    const item = e.target.closest('.pi');
    if (!item || item.classList.contains('done')) return;
    addFromDB(+item.dataset.idx);
  };
}
function addManual() {
  const r = document.getElementById('mr').value.trim();
  const n = document.getElementById('mn').value.trim();
  const a = document.getElementById('ma').value.trim();
  if (!n) { document.getElementById('mn').focus(); return; }
  today.push({id:uid++, label:r+n, addr:a});
  renderToday(); updatePrev(); closePanel();
}

// ─── Generate & Copy ───
function generate() {
  const v = document.getElementById('dateInput').value;
  if (!v || !today.length) return '';
  const [y,m,d] = v.split('-').map(Number);
  const wd = WD[new Date(y,m-1,d).getDay()];
  const hdr = `🍞${p2(m)} / ${p2(d)}（${wd}）快閃市場`;
  const locs = today.map(m2 => m2.addr ? `❤️${m2.label}：${m2.addr}` : `❤️${m2.label}`).join('\n');
  return `${hdr}\n\n${locs}${STATIC}`;
}
function updatePrev() {
  document.getElementById('warn').style.display = today.length ? 'none' : 'block';
  document.getElementById('preview').textContent = generate() || '（請先新增市場）';
}
async function doPost() {
  const txt = generate();
  if (!txt) { document.getElementById('warn').style.display = 'block'; return; }
  try { await navigator.clipboard.writeText(txt); } catch {
    const ta = document.createElement('textarea');
    ta.value = txt; ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0;width:1px;height:1px';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
  }
  const b = document.getElementById('copyBtn');
  b.textContent = '✅ 已複製！'; b.classList.add('done');
  setTimeout(() => { b.textContent = '📋 複製貼文'; b.classList.remove('done'); }, 2500);
}

// ─── Init ───
document.getElementById('dateInput').value = initDate();
document.getElementById('dateInput').addEventListener('change', e => { refreshDP(e.target.value); updatePrev(); });
refreshDP(initDate());
renderToday();
updatePrev();
</script>
</body>
